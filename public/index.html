<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Parkour Vô Tận - Chế Độ Dễ</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background: #070714; overflow: hidden; font-family: 'Rajdhani', sans-serif; user-select: none; }
        canvas { display: block; background: radial-gradient(circle, #151530 0%, #050510 100%); margin: 0 auto; box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); }
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-sizing: border-box; padding: 25px; }
        
        .hud-panel { background: rgba(10, 10, 25, 0.85); border-left: 5px solid #00ffcc; padding: 12px 25px; display: inline-block; backdrop-filter: blur(8px); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); }
        .hud-label { font-size: 13px; color: #8892b0; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .hud-value { font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
        .highscore-box { margin-top: 5px; font-size: 14px; color: #ff3366; font-weight: bold; letter-spacing: 1px; }

        .online-list { position: absolute; top: 25px; right: 25px; background: rgba(10, 10, 25, 0.85); border-right: 5px solid #ff3366; padding: 15px; width: 220px; backdrop-filter: blur(8px); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); }
        .list-title { font-size: 14px; color: #ff3366; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 700; border-bottom: 1px solid rgba(255, 51, 102, 0.2); padding-bottom: 5px; display: flex; justify-content: space-between; }
        .player-item { font-size: 15px; color: #fff; padding: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .player-badge { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .controls-hint { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.7); padding: 8px 20px; border-radius: 20px; color: #8892b0; font-size: 14px; }
        .key-cap { background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; margin: 0 2px; font-family: monospace; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="game-ui">
        <div class="hud-panel">
            <div class="hud-label">Tầng Đang Đứng</div>
            <div><span class="hud-value" id="floorUI">01</span> <span style="color:#4e5d78; font-size:18px;">F</span></div>
            <div class="highscore-box">🏆 KỶ LỤC PHÒNG: <span id="highScoreUI">1</span>F</div>
        </div>

        <div class="online-list">
            <div class="list-title"><span>BẢNG XẾP HẠNG</span> <span id="playerCount" style="color: #fff;">1</span></div>
            <div id="playerListEntries"></div>
        </div>

        <div class="controls-hint">
            Di chuyển: <span class="key-cap">A</span><span class="key-cap">D</span> / <span class="key-cap">◀</span><span class="key-cap">▶</span> | Nhảy: <span class="key-cap">Space</span> / <span class="key-cap">W</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const socket = io(); 
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- 🛠️ ĐIỀU CHỈNH VẬT LÝ: GIÚP DI CHUYỂN NHẠY VÀ NHẢY CAO HƠN ---
const gravity = 0.45;       // Giảm trọng lực để nhân vật rơi chậm hơn một chút
const friction = 0.85;      // Tăng ma sát để di chuyển mượt, phanh chuẩn hơn

let player = { 
    x: 400, y: 500, 
    width: 24, height: 38, 
    vx: 0, vy: 0, 
    isGrounded: false, 
    color: '#00ffcc', 
    currentFloor: 1 
};
let otherPlayers = {};
let keys = {};
let cameraY = 0;
let globalHighestFloor = 1;

let platforms = [];
let maxGeneratedFloor = 1;

// Khởi tạo nền móng rộng rãi
platforms.push({ x: 0, y: 580, width: 2000, height: 40, floorNum: 1 });

// --- 🛠️ THUẬT TOÁN SINH MAP SIÊU DỄ ---
function generateFloorsUpTo(targetFloor) {
    while (maxGeneratedFloor < targetFloor + 20) {
        maxGeneratedFloor++;
        let i = maxGeneratedFloor;
        
        // 1. Giảm khoảng cách chiều cao giữa các tầng từ 145px xuống còn 90px (Bấm nhảy nhẹ là tới)
        let yPos = 580 - (i - 1) * 90; 
        
        // 2. Làm các bậc nhảy to gấp đôi (Rộng từ 180px đến 240px, cực kỳ khó trượt)
        let width = 180 + Math.sin(i * 1.5) * 30; 
        
        // 3. Giới hạn vùng xuất hiện gạch ở trung tâm màn hình, không bị lệch ra sát biên
        let xPos = 200 + (Math.cos(i * 2.3) * 120); 
        
        platforms.push({ x: xPos, y: yPos, width: width, height: 14, floorNum: i });
    }
    // Xóa bớt gạch cũ quá xa phía dưới để tối ưu hiệu năng bộ nhớ
    platforms = platforms.filter(plat => plat.y < cameraY + 1200);
}

function updateGameUI() {
    document.getElementById("floorUI").innerText = player.currentFloor < 10 ? "0" + player.currentFloor : player.currentFloor;
    document.getElementById("highScoreUI").innerText = globalHighestFloor;

    let allPlayers = [{ name: 'Bạn', color: player.color, floor: player.currentFloor }];
    Object.keys(otherPlayers).forEach(id => {
        allPlayers.push({ name: `ID:${id.substring(0,4)}`, color: otherPlayers[id].color, floor: otherPlayers[id].currentFloor });
    });
    allPlayers.sort((a, b) => b.floor - a.floor);

    let listHTML = "";
    allPlayers.forEach((p, index) => {
        listHTML += `<div class="player-item">
            <span>#${index+1} <span class="player-badge" style="background:${p.color}"></span>${p.name}</span>
            <span style="color:${index===0?'#00ffcc':'#fff'}; font-weight:bold;">F${p.floor}</span>
        </div>`;
    });
    document.getElementById("playerCount").innerText = allPlayers.length + " Online";
    document.getElementById("playerListEntries").innerHTML = listHTML;
}

// Đồng bộ qua Socket.io
socket.on('currentPlayers', (data) => {
    globalHighestFloor = data.globalHighestFloor;
    Object.keys(data.players).forEach((id) => {
        if (id !== socket.id) otherPlayers[id] = data.players[id];
        else player.color = data.players[id].color;
    });
    updateGameUI();
});

socket.on('newPlayer', (playerInfo) => {
    otherPlayers[playerInfo.id] = playerInfo;
    updateGameUI();
});

socket.on('playerMoved', (playerInfo) => {
    if (otherPlayers[playerInfo.id]) {
        otherPlayers[playerInfo.id].x = playerInfo.x;
        otherPlayers[playerInfo.id].y = playerInfo.y;
        otherPlayers[playerInfo.id].currentFloor = playerInfo.currentFloor;
        updateGameUI();
    }
});

socket.on('playerDisconnected', (id) => {
    delete otherPlayers[id];
    updateGameUI();
});

socket.on('newHighScore', (score) => {
    globalHighestFloor = score;
    document.getElementById("highScoreUI").innerText = globalHighestFloor;
});

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function checkCollision(p, plat) {
    return p.x < plat.x + plat.width && p.x + p.width > plat.x &&
           p.y + p.height >= plat.y && p.y + p.height <= plat.y + plat.height && p.vy >= 0;
}

function gameLoop() {
    // Tăng nhẹ lực đẩy khi bấm phím để di chuyển nhanh nhạy hơn
    if (keys["ArrowRight"] || keys["KeyD"]) player.vx += 0.85;
    if (keys["ArrowLeft"] || keys["KeyA"]) player.vx -= 0.85;
    
    // Giữ nguyên lực nhảy mạnh (-11.5) trên nền trọng lực nhẹ hơn -> Nhảy siêu cao
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.isGrounded) {
        player.vy = -11.5;
        player.isGrounded = false;
    }

    player.vx *= friction;
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    generateFloorsUpTo(player.currentFloor);

    player.isGrounded = false;
    let oldFloor = player.currentFloor;

    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.isGrounded = true;
            if(plat.floorNum > player.currentFloor) player.currentFloor = plat.floorNum;
        }
    }

    if (player.currentFloor !== oldFloor) updateGameUI();

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    let targetCameraY = player.y - canvas.height / 2 - 50;
    cameraY += (targetCameraY - cameraY) * 0.1;

    socket.emit('playerMovement', { x: player.x, y: player.y, currentFloor: player.currentFloor });

    // Vẽ đồ họa
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(0, -cameraY);

    ctx.strokeStyle = "rgba(0, 255, 204, 0.015)";
    ctx.lineWidth = 1;
    let startGridY = Math.floor(cameraY / 40) * 40;
    for (let gY = startGridY; gY < startGridY + canvas.height + 40; gY += 40) {
        ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(canvas.width, gY); ctx.stroke();
    }

    platforms.forEach(plat => {
        if (plat.y > cameraY - 100 && plat.y < cameraY + canvas.height + 100) {
            let isMilestone = plat.floorNum % 50 === 0;
            ctx.shadowBlur = isMilestone ? 18 : 6;
            ctx.shadowColor = isMilestone ? "#ff0055" : "#00ffcc";
            ctx.fillStyle = isMilestone ? "rgba(255, 0, 85, 0.95)" : "rgba(0, 255, 204, 0.75)";
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            ctx.shadowBlur = 0;

            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.font = "bold 9px Orbitron";
            ctx.fillText("FLR-" + plat.floorNum, plat.x + 5, plat.y - 5);
        }
    });

    Object.keys(otherPlayers).forEach((id) => {
        let p = otherPlayers[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 24, 38);
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.font = "9px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(`ID:${id.substring(0,4)}`, p.x + 12, p.y - 7);
        ctx.textAlign = "left";
    });

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.strokeRect(player.x, player.y, player.width, player.height);

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
