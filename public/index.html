<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Parkour 300 Tầng - Multiplayer</title>
    <!-- Nhúng Font chữ phong cách tương lai từ Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* --- ĐỊNH DẠNG GIAO DIỆN CHUNG --- */
        body { 
            margin: 0; 
            background: #0b0b16; 
            overflow: hidden; 
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
        }
        
        canvas { 
            display: block; 
            background: radial-gradient(circle, #1a1a3a 0%, #070714 100%); 
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.15);
        }

        /* --- LỚP UI PHỦ PHÍA TRÊN GAME --- */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Giúp không bị đè lên tương tác chuột click vào canvas */
            box-sizing: border-box;
            padding: 25px;
        }

        /* Khung hiển thị Tầng Hiện Tại (Góc trên bên trái) */
        .floor-counter {
            background: rgba(15, 15, 35, 0.75);
            border-left: 5px solid #00ffcc;
            border-right: 1px solid rgba(0, 255, 204, 0.2);
            border-top: 1px solid rgba(0, 255, 204, 0.2);
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding: 12px 25px;
            display: inline-block;
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        .floor-label {
            font-size: 14px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .floor-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
        }
        .floor-total {
            font-size: 16px;
            color: #4e5d78;
        }

        /* Bảng danh sách người chơi Online (Góc trên bên phải) */
        .online-list {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(15, 15, 35, 0.75);
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-right: 5px solid #ff3366;
            padding: 15px;
            width: 200px;
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        .list-title {
            font-size: 14px;
            color: #ff3366;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 51, 102, 0.2);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .player-item {
            font-size: 15px;
            color: #fff;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Thanh Tiến Trình Leo Tháp (Bên cạnh màn hình) */
        .progress-bar-container {
            position: absolute;
            left: 25px;
            bottom: 40px;
            top: 150px;
            width: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            flex-direction: column-reverse;
        }
        .progress-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #ff3366, #00ffcc);
            border-radius: 4px;
            box-shadow: 0 0 15px #00ffcc;
            transition: height 0.3s ease;
        }

        /* Hướng dẫn nút bấm (Dưới cùng màn hình) */
        .controls-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8892b0;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .key-cap {
            background: #333;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border-bottom: 2px solid #111;
            margin: 0 2px;
        }
    </style>
    <!-- Tự động tải thư viện kết nối mạng Socket.io từ Server -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- LỚP GIAO DIỆN UI ĐẸP MẮT -->
    <div id="game-ui">
        <!-- Đếm tầng -->
        <div class="floor-counter">
            <div class="floor-label">Vị trí hiện tại</div>
            <div>
                <span class="floor-value" id="floorUI">01</span>
                <span class="floor-total">/ 300 F</span>
            </div>
        </div>

        <!-- Thanh đo độ cao trực quan -->
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Bảng danh sách người chơi trực tuyến -->
        <div class="online-list">
            <div class="list-title">
                <span>Phòng chơi</span>
                <span id="playerCount" style="color: #fff;">1</span>
            </div>
            <div id="playerListEntries">
                <!-- Danh sách người chơi sẽ tự động điền bằng JS ở dưới -->
            </div>
        </div>

        <!-- Hướng dẫn điều khiển -->
        <div class="controls-hint">
            Di chuyển: <span class="key-cap">A</span><span class="key-cap">D</span> hoặc <span class="key-cap">◀</span><span class="key-cap">▶</span> | Nhảy: <span class="key-cap">Space</span> hoặc <span class="key-cap">W</span>
        </div>
    </div>

    <!-- KHUNG ĐỒ HỌA GAME -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const socket = io();
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- CẤU HÌNH VẬT LÝ ---
const gravity = 0.5;
const friction = 0.8;

// --- KHỞI TẠO NHÂN VẬT ---
let player = {
    x: 400, y: 500,
    width: 24, height: 38,
    vx: 0, vy: 0,
    isGrounded: false,
    color: '#00ffcc',
    currentFloor: 1
};

let otherPlayers = {};
let keys = {};
let cameraY = 0;

// --- THUẬT TOÁN TẠO 300 TẦNG ---
let platforms = [];
// Nền xuất phát rộng rãi
platforms.push({ x: 0, y: 580, width: 2000, height: 40, floorNum: 1 });

for (let i = 2; i <= 300; i++) {
    let yPos = 580 - (i - 1) * 150; 
    let width = 110 + Math.sin(i) * 30; // Độ rộng gạch biến thiên mượt mà hơn
    let xPos = 150 + (Math.cos(i * 7) * 230) + 200; 
    
    platforms.push({
        x: xPos,
        y: yPos,
        width: width,
        height: 14,
        floorNum: i
    });
}

// --- HÀM CẬP NHẬT ĐIỀU CHỈNH GIAO DIỆN ĐỒ HỌA (UI HUDS) ---
function updateGameUI() {
    // 1. Cập nhật số tầng định dạng "001"
    let formattedFloor = player.currentFloor < 10 ? "0" + player.currentFloor : player.currentFloor;
    document.getElementById("floorUI").innerText = formattedFloor;

    // 2. Cập nhật thanh tiến trình phần trăm leo tháp
    let progressPercent = ((player.currentFloor - 1) / 299) * 100;
    document.getElementById("progressFill").style.height = progressPercent + "%";

    // 3. Làm mới bảng danh sách người chơi online bên phải
    let listHTML = `<div class="player-item">
        <span><span class="player-badge" style="background:${player.color}"></span>Bạn</span>
        <span style="color:#00ffcc; font-weight:bold;">F${player.currentFloor}</span>
    </div>`;
    
    let count = 1;
    Object.keys(otherPlayers).forEach((id) => {
        count++;
        let p = otherPlayers[id];
        listHTML += `<div class="player-item">
            <span><span class="player-badge" style="background:${p.color}"></span>ID:${id.substring(0,4)}</span>
            <span style="color:#ff3366;">F${p.currentFloor}</span>
        </div>`;
    });
    
    document.getElementById("playerCount").innerText = count + " Online";
    document.getElementById("playerListEntries").innerHTML = listHTML;
}

// --- KẾT NỐI MẠNG MULTIPLAYER (SOCKET.IO) ---
socket.on('currentPlayers', (players) => {
    Object.keys(players).forEach((id) => {
        if (id !== socket.id) {
            otherPlayers[id] = players[id];
        } else {
            player.color = players[id].color;
        }
    });
    updateGameUI();
});

socket.on('newPlayer', (playerInfo) => {
    otherPlayers[playerInfo.id] = playerInfo;
    updateGameUI();
});

socket.on('playerMoved', (playerInfo) => {
    if (otherPlayers[playerInfo.id]) {
        otherPlayers[playerInfo.id].x = playerInfo.x;
        otherPlayers[playerInfo.id].y = playerInfo.y;
        otherPlayers[playerInfo.id].currentFloor = playerInfo.currentFloor;
        updateGameUI();
    }
});

socket.on('playerDisconnected', (id) => {
    delete otherPlayers[id];
    updateGameUI();
});

// --- LẮNG NGHE ĐIỀU KHIỂN ---
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function checkCollision(p, plat) {
    return p.x < plat.x + plat.width &&
           p.x + p.width > plat.x &&
           p.y + p.height >= plat.y &&
           p.y + p.height <= plat.y + plat.height &&
           p.vy >= 0;
}

// --- VÒNG LẶP CHÍNH (GAME LOOP) ---
function gameLoop() {
    // 1. Logic nút bấm di chuyển nhân vật
    if (keys["ArrowRight"] || keys["KeyD"]) player.vx += 0.8;
    if (keys["ArrowLeft"] || keys["KeyA"]) player.vx -= 0.8;
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.isGrounded) {
        player.vy = -11.5; 
        player.isGrounded = false;
    }

    player.vx *= friction;
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // 2. Logic tính toán va chạm nền đất
    player.isGrounded = false;
    let oldFloor = player.currentFloor;
    
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.isGrounded = true;
            if(plat.floorNum > player.currentFloor) {
                player.currentFloor = plat.floorNum;
            }
        }
    }

    // Nếu thay đổi số tầng thì cập nhật UI ngay lập tức
    if (player.currentFloor !== oldFloor) {
        updateGameUI();
    }

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    // 3. Đồng bộ Camera (Cuộn mượt dạng Lerp)
    let targetCameraY = player.y - canvas.height / 2 - 50;
    cameraY += (targetCameraY - cameraY) * 0.1;

    // Gửi vị trí đồng bộ mạng liên tục
    socket.emit('playerMovement', { x: player.x, y: player.y, currentFloor: player.currentFloor });

    // 4. VẼ ĐỒ HỌA LÊN CANVAS CHUYÊN NGHIỆP HƠN
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(0, -cameraY);

    // Vẽ lưới điện Neon mờ ảo làm nền phía sau cho đẹp mắt (Grid effect)
    ctx.strokeStyle = "rgba(0, 255, 204, 0.02)";
    ctx.lineWidth = 1;
    for (let g = 0; g < canvas.width; g += 40) {
        ctx.beginPath(); ctx.moveTo(g, cameraY); ctx.lineTo(g, cameraY + canvas.height); ctx.stroke();
    }

    // Vẽ 300 tầng gạch dạng Neon Phát Sáng
    platforms.forEach(plat => {
        // Chỉ vẽ những gạch đang nằm trong tầm nhìn camera để game chạy mượt nhẹ
        if (plat.y > cameraY - 100 && plat.y < cameraY + canvas.height + 100) {
            let isCheckpoint = plat.floorNum % 10 === 0;
            
            // Đổ bóng phát sáng (Glow effect) cho các bậc nhảy
            ctx.shadowBlur = isCheckpoint ? 15 : 6;
            ctx.shadowColor = isCheckpoint ? "#ff3366" : "#00ffcc";
            
            ctx.fillStyle = isCheckpoint ? "rgba(255, 51, 102, 0.9)" : "rgba(0, 255, 204, 0.8)";
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            
            // Reset hiệu ứng shadow để không làm lag nhân vật
            ctx.shadowBlur = 0;

            // Viết nhãn tầng phong cách tối giản
            ctx.fillStyle = "rgba(255,255,255,0.25)";
            ctx.font = "bold 10px Orbitron";
            ctx.fillText("FLR-" + plat.floorNum, plat.x + 6, plat.y - 6);
        }
    });

    // Vẽ những người chơi khác trực tuyến
    Object.keys(otherPlayers).forEach((id) => {
        let p = otherPlayers[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 24, 38);
        
        // Vẽ tag ID mini trên đầu người chơi khác
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.font = "9px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(`ID:${id.substring(0,4)}`, p.x + 12, p.y - 8);
        ctx.textAlign = "left"; // Reset
    });

    // Vẽ chính nhân vật của bạn (Có thêm khung viền trắng nổi bật)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.strokeRect(player.x, player.y, player.width, player.height);

    ctx.restore();

    requestAnimationFrame(gameLoop);
}

// Bật chạy game
gameLoop();
</script>
</body>
</html>
