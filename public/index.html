<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none, minimal-ui">
    <title>Cyber Parkour Vô Tận - Bản Chuẩn Khắc Phục Màn Hình Đen</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background: #070714; overflow: hidden; font-family: 'Rajdhani', sans-serif; user-select: none; touch-action: none; -webkit-touch-callout: none; position: relative; width: 100vw; height: 100vh; }
        
        canvas { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #151530 0%, #050510 100%); 
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); 
            width: 100vw; 
            height: 100vh; 
            max-width: 800px; 
            max-height: 600px; 
            z-index: 1; 
        }
        
        #game-ui { 
            position: absolute; 
            top: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100vw; 
            height: 100vh; 
            max-width: 800px;
            max-height: 600px;
            pointer-events: none; 
            box-sizing: border-box; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 10; 
        }
        
        .hud-panel { background: rgba(10, 10, 25, 0.85); border-left: 5px solid #00ffcc; padding: 10px 20px; display: inline-block; backdrop-filter: blur(8px); pointer-events: auto; }
        .hud-label { font-size: 14px; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .hud-value { font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900; color: #ffffff; }
        .highscore-box { margin-top: 3px; font-size: 14px; color: #ffcc00; font-weight: bold; }

        .online-list { position: absolute; top: 15px; right: 15px; background: rgba(10, 10, 25, 0.85); border-right: 5px solid #ff3366; padding: 10px; width: 140px; backdrop-filter: blur(8px); pointer-events: auto; }
        .list-title { font-size: 12px; color: #ff3366; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid rgba(255, 51, 102, 0.2); padding-bottom: 3px; display: flex; justify-content: space-between; }
        .player-item { font-size: 13px; color: #fff; padding: 3px 0; display: flex; justify-content: space-between; }
        .player-badge { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        #mobile-controls { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 15px 30px 15px; 
            box-sizing: border-box; 
            pointer-events: auto; 
        }
        .d-pad { display: flex; gap: 30px; }
        .btn-touch { 
            width: 85px; 
            height: 85px; 
            background: rgba(20, 20, 45, 0.9); 
            border: 4px solid #00ffcc; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #00ffcc; 
            font-size: 36px; 
            font-weight: bold; 
            backdrop-filter: blur(4px); 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
        }
        .btn-touch:active { 
            background: rgba(0, 255, 204, 0.5); 
            border-color: #ffffff; 
            box-shadow: 0 0 30px #00ffcc;
            transform: scale(0.9); 
        }
        .btn-jump { 
            border-color: #ff3366; 
            color: #ff3366; 
            width: 90px; 
            height: 90px; 
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }
        .btn-jump:active { 
            background: rgba(255, 51, 102, 0.5); 
            border-color: #ffffff; 
            box-shadow: 0 0 30px #ff3366;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- KHUNG VẼ ĐỒ HỌA GAME -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- LỚP HUD ĐỀM TRÊN MÀN HÌNH -->
    <div id="game-ui">
        <div>
            <div class="hud-panel">
                <div class="hud-label">SỐ TẦNG CỦA BẠN</div>
                <div><span class="hud-value" id="floorUI">01</span> <span style="color:#4e5d78; font-size:16px; font-weight: bold;">TẦNG</span></div>
                <div class="highscore-box">👑 KỶ LỤC: <span id="highScoreUI">1</span> TẦNG</div>
            </div>

            <div class="online-list">
                <div class="list-title"><span>PHÒNG</span> <span id="playerCount">1</span></div>
                <div id="playerListEntries"></div>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="d-pad">
                <div class="btn-touch" id="btnLeft">◀</div>
                <div class="btn-touch" id="btnRight">▶</div>
            </div>
            <div class="btn-touch btn-jump" id="btnJump">NHẢY</div>
        </div>
    </div>

<script>
const socket = io(); 
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.40; 
let currentFriction = 0.85;
let speedMultiplier = 1.0; 

let player = { x: 400, y: 500, width: 26, height: 40, vx: 0, vy: 0, isGrounded: false, color: '#00ffcc', currentFloor: 1 };
let otherPlayers = {};
let keys = {};
let touchKeys = { left: false, right: false, jump: false };
let cameraY = 0;
let globalHighestFloor = 1;

let platforms = [];
let maxGeneratedFloor = 1;

const groundPlatform = { x: -1000, y: 580, width: 4000, height: 40, floorNum: 1, type: 'normal', hasSpikes: false };
platforms.push(groundPlatform);

function generateFloorsUpTo(targetFloor) {
    while (maxGeneratedFloor < targetFloor + 25) {
        maxGeneratedFloor++;
        let i = maxGeneratedFloor;
        
        let yPos = 580 - (i - 1) * 70; 
        let width = 320 + Math.sin(i * 1.5) * 30; 
        let xPos = 240 + (Math.cos(i * 2) * 50); 
        
        let type = 'normal';
        let moveSpeed = 0;
        let moveRange = 60;
        let startX = xPos;

        let rand = Math.random();
        if (rand < 0.15) {
            type = 'moving';
            moveSpeed = 0.7; 
        } else if (rand >= 0.15 && rand < 0.3) {
            type = 'spring'; 
            width = 220; 
        } else if (rand >= 0.3 && rand < 0.5) {
            type = 'ice'; 
        }

        let hasSpikes = (type === 'normal') && Math.random() < 0.1;
        let spikeWidth = 30;
        let spikeX = xPos + 40 + Math.random() * (width - 100);
        
        platforms.push({ 
            x: xPos, startX, y: yPos, width, height: 16, floorNum: i, 
            type, moveSpeed, moveRange, direction: 1,
            hasSpikes, spikeX, spikeWidth
        });
    }
    platforms = platforms.filter(plat => plat.floorNum === 1 || plat.y < cameraY + 1200);
}

function updateGameUI() {
    document.getElementById("floorUI").innerText = player.currentFloor < 10 ? "0" + player.currentFloor : player.currentFloor;
    document.getElementById("highScoreUI").innerText = globalHighestFloor;

    let allPlayers = [{ name: 'Bạn', color: player.color, floor: player.currentFloor }];
    Object.keys(otherPlayers).forEach(id => {
        allPlayers.push({ name: `ID:${id.substring(0,4)}`, color: otherPlayers[id].color, floor: otherPlayers[id].currentFloor });
    });
    allPlayers.sort((a, b) => b.floor - a.floor);

    let listHTML = "";
    allPlayers.forEach((p, index) => {
        listHTML += `<div class="player-item">
            <span><span class="player-badge" style="background:${p.color}"></span>${p.name}</span>
            <span style="color:#00ffcc; font-weight:bold;">F${p.floor}</span>
        </div>`;
    });
    document.getElementById("playerCount").innerText = allPlayers.length;
    document.getElementById("playerListEntries").innerHTML = listHTML;
}

function dieAndReset() {
    player.x = 400; player.y = 500; player.vx = 0; player.vy = 0;
    player.currentFloor = 1; player.isGrounded = false;
    speedMultiplier = 1.0;
    if (!platforms.some(p => p.floorNum === 1)) platforms.push(groundPlatform);
    cameraY = player.y - canvas.height / 2 - 50; 
    updateGameUI();
}

socket.on('currentPlayers', (data) => {
    globalHighestFloor = data.globalHighestFloor;
    Object.keys(data.players).forEach((id) => {
        if (id !== socket.id) otherPlayers[id] = data.players[id];
        else player.color = data.players[id].color;
    });
    updateGameUI();
});
socket.on('newPlayer', (p) => { otherPlayers[p.id] = p; updateGameUI(); });
socket.on('playerMoved', (p) => { if (otherPlayers[p.id]) { otherPlayers[p.id].x = p.x; otherPlayers[p.id].y = p.y; otherPlayers[p.id].currentFloor = p.currentFloor; updateGameUI(); } });
socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; updateGameUI(); });
socket.on('newHighScore', (score) => { globalHighestFloor = score; document.getElementById("highScoreUI").innerText = globalHighestFloor; });

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function setupMobileButton(btnId, targetKey) {
    const btn = document.getElementById(btnId);
    
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); touchKeys[targetKey] = true; if (navigator.vibrate) navigator.vibrate(20); }, { passive: false });
    btn.addEventListener("touchend", (e) => { e.preventDefault(); touchKeys[targetKey] = false; }, { passive: false });
    btn.addEventListener("touchcancel", (e) => { e.preventDefault(); touchKeys[targetKey] = false; }, { passive: false });
    
    btn.addEventListener("mousedown", (e) => { e.preventDefault(); touchKeys[targetKey] = true; });
    btn.addEventListener("mouseup", (e) => { e.preventDefault(); touchKeys[targetKey] = false; });
    btn.addEventListener("mouseleave", () => { touchKeys[targetKey] = false; });
}

setupMobileButton("btnLeft", "left");
setupMobileButton("btnRight", "right");
setupMobileButton("btnJump", "jump");

function checkCollision(p, plat) {
    return p.x < plat.x + plat.width && p.x + p.width > plat.x &&
           p.y + p.height >= plat.y && p.y + p.height <= plat.y + plat.height && p.vy >= 0;
}

function gameLoop() {
    let moveForce = 0.9 * speedMultiplier;
    
    if (keys["ArrowRight"] || keys["KeyD"] || touchKeys.right) player.vx += moveForce;
    if (keys["ArrowLeft"] || keys["KeyA"] || touchKeys.left) player.vx -= moveForce;
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"] || touchKeys.jump) && player.isGrounded) {
        player.vy = -10.5; 
        player.isGrounded = false;
    }

    player.vx *= currentFriction;
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    generateFloorsUpTo(player.currentFloor);

    let standingOnIce = false;
    player.isGrounded = false;
    let oldFloor = player.currentFloor;

    for (let plat of platforms) {
        if (plat.type === 'moving') {
            plat.x += plat.moveSpeed * plat.direction;
            if (plat.x > plat.startX + plat.moveRange || plat.x < plat.startX - plat.moveRange) {
                plat.direction *= -1;
            }
        }

        if (checkCollision(player, plat)) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.isGrounded = true;
            if(plat.floorNum > player.currentFloor) player.currentFloor = plat.floorNum;

            if (plat.type === 'moving') player.x += plat.moveSpeed * plat.direction;
            if (plat.type === 'spring') { player.vy = -15; player.isGrounded = false; }
            if (plat.type === 'ice') { standingOnIce = true; }
        }

        if (plat.hasSpikes && player.currentFloor >= plat.floorNum - 1) {
            let spikeTop = plat.y - 12;
            if (player.x + player.width > plat.spikeX && 
                player.x < plat.spikeX + plat.spikeWidth &&
                player.y + player.height >= spikeTop && player.y <= plat.y) {
                dieAndReset();
                break;
            }
        }
    }

    if (standingOnIce) {
        speedMultiplier = 0.45; 
        currentFriction = 0.88; 
    } else {
        speedMultiplier = 1.0;  
        currentFriction = 0.85;
    }

    if (player.y > cameraY + canvas.height + 150) {
        dieAndReset();
    }

    if (player.currentFloor !== oldFloor) updateGameUI();

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    let targetCameraY = player.y - canvas.height / 2 - 50;
    cameraY += (targetCameraY - cameraY) * 0.1;

    socket.emit('playerMovement', { x: player.x, y: player.y, currentFloor: player.currentFloor });

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(0, -cameraY);

    // Lưới nền mờ
    ctx.strokeStyle = "rgba(0, 255, 204, 0.01)";
    ctx.lineWidth = 1;
    let startGridY = Math.floor(cameraY / 40) * 40;
    for (let gY = startGridY; gY < startGridY + canvas.height + 40; gY += 40) {
        ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(canvas.width, gY); 
        ctx.stroke(); // 🛠️ ĐÃ SỬA LỖI ĐÁNG TIẾC: Thêm chính xác lệnh ctx.stroke() để chạy mượt mà
    }

    platforms.forEach(plat => {
        if (plat.y > cameraY - 100 && plat.y < cameraY + canvas.height + 100) {
            if (plat.type === 'moving') { ctx.shadowBlur = 10; ctx.shadowColor = "#cc33ff"; ctx.fillStyle = "rgba(204, 51, 255, 0.85)"; }
            else if (plat.type === 'spring') { ctx.shadowBlur = 12; ctx.shadowColor = "#ffcc00"; ctx.fillStyle = "rgba(255, 204, 0, 0.9)"; }
            else if (plat.type === 'ice') { ctx.shadowBlur = 12; ctx.shadowColor = "#0066ff"; ctx.fillStyle = "rgba(0, 102, 255, 0.9)"; } 
            else { ctx.shadowBlur = 6; ctx.shadowColor = "#00ffcc"; ctx.fillStyle = "rgba(0, 255, 204, 0.7)"; }
            
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            ctx.shadowBlur = 0;

            if (plat.type === 'spring') { ctx.fillStyle = "#ffffff"; ctx.fillRect(plat.x + 10, plat.y - 4, plat.width - 20, 4); }

            if (plat.hasSpikes) {
                ctx.shadowBlur = 10; ctx.shadowColor = "#ff3333"; ctx.fillStyle = "#ff3355";
                ctx.beginPath();
                let spikeCount = 3;
                let singleSpikeWidth = plat.spikeWidth / spikeCount;
                for (let s = 0; s < spikeCount; s++) {
                    let sX = plat.spikeX + (s * singleSpikeWidth);
                    ctx.moveTo(sX, plat.y); ctx.lineTo(sX + singleSpikeWidth / 2, plat.y - 12); ctx.lineTo(sX + singleSpikeWidth, plat.y);
                }
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.font = "bold 11px Orbitron";
            let label = plat.type === 'ice' ? "ICE" : "TẦNG";
            ctx.fillText(label + " " + plat.floorNum, plat.x + 15, plat.y - 5);
        }
    });

    Object.keys(otherPlayers).forEach((id) => {
        let p = otherPlayers[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 24, 38);
    });

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.strokeRect(player.x, player.y, player.width, player.height);

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
