<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Cyber Parkour Vô Tận - Mobile & Bẫy Gai</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background: #070714; overflow: hidden; font-family: 'Rajdhani', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; background: radial-gradient(circle, #151530 0%, #050510 100%); margin: 0 auto; box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); width: 100vw; height: 100vh; max-width: 800px; max-height: 600px; }
        
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-sizing: border-box; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .hud-panel { background: rgba(10, 10, 25, 0.85); border-left: 5px solid #00ffcc; padding: 10px 20px; display: inline-block; backdrop-filter: blur(8px); }
        .hud-label { font-size: 12px; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; }
        .hud-value { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; color: #00ffcc; }
        .highscore-box { margin-top: 3px; font-size: 13px; color: #ff3366; font-weight: bold; }

        .online-list { position: absolute; top: 15px; right: 15px; background: rgba(10, 10, 25, 0.85); border-right: 5px solid #ff3366; padding: 10px; width: 160px; backdrop-filter: blur(8px); }
        .list-title { font-size: 12px; color: #ff3366; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid rgba(255, 51, 102, 0.2); padding-bottom: 3px; display: flex; justify-content: space-between; }
        .player-item { font-size: 13px; color: #fff; padding: 3px 0; display: flex; justify-content: space-between; }
        .player-badge { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* --- HỆ THỐNG NÚT BẤM ẢO CHO ĐIỆN THOẠI (MOBILE UI) --- */
        #mobile-controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: auto; }
        .d-pad { display: flex; gap: 15px; }
        .btn-touch { width: 65px; height: 65px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(0, 255, 204, 0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #00ffcc; font-size: 28px; font-weight: bold; backdrop-filter: blur(4px); -webkit-user-select: none; }
        .btn-touch:active { background: rgba(0, 255, 204, 0.3); border-color: #00ffcc; transform: scale(0.95); }
        .btn-jump { border-color: rgba(255, 51, 102, 0.4); color: #ff3366; width: 70px; height: 70px; }
        .btn-jump:active { background: rgba(255, 51, 102, 0.3); border-color: #ff3366; }

        /* Ẩn nút trên máy tính, chỉ hiện khi dùng điện thoại */
        @media (pointer: fine) { #mobile-controls { display: none; } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="game-ui">
        <div>
            <div class="hud-panel">
                <div class="hud-label">Tầng Hiện Tại</div>
                <div><span class="hud-value" id="floorUI">01</span> <span style="color:#4e5d78; font-size:14px;">F</span></div>
                <div class="highscore-box">🏆 KỶ LỤC: <span id="highScoreUI">1</span>F</div>
            </div>

            <div class="online-list">
                <div class="list-title"><span>PHÒNG</span> <span id="playerCount">1</span></div>
                <div id="playerListEntries"></div>
            </div>
        </div>

        <!-- Nút bấm điều khiển trên Mobile -->
        <div id="mobile-controls">
            <div class="d-pad">
                <div class="btn-touch" id="btnLeft">◀</div>
                <div class="btn-touch" id="btnRight">▶</div>
            </div>
            <div class="btn-touch btn-jump" id="btnJump">▲</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const socket = io(); 
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.45;
const friction = 0.85;

let player = { x: 400, y: 500, width: 24, height: 38, vx: 0, vy: 0, isGrounded: false, color: '#00ffcc', currentFloor: 1 };
let otherPlayers = {};
let keys = {};
let touchKeys = { left: false, right: false, jump: false };
let cameraY = 0;
let globalHighestFloor = 1;

let platforms = [];
let maxGeneratedFloor = 1;

// Khởi tạo nền xuất phát an toàn (không có gai)
platforms.push({ x: 0, y: 580, width: 2000, height: 40, floorNum: 1, hasSpikes: false });

// --- THUẬT TOÁN SINH TẦNG DỄ + BẪY GAI NGẪU NHIÊN ---
function generateFloorsUpTo(targetFloor) {
    while (maxGeneratedFloor < targetFloor + 20) {
        maxGeneratedFloor++;
        let i = maxGeneratedFloor;
        let yPos = 580 - (i - 1) * 90; 
        let width = 180 + Math.sin(i * 1.5) * 30; 
        let xPos = 200 + (Math.cos(i * 2.3) * 120); 
        
        // Tỷ lệ xuất hiện gai trên bậc nhảy là 35% (trừ các tầng mốc 10)
        let hasSpikes = i % 10 !== 0 && Math.sin(i * 9.8) > 0.3;
        let spikeX = 0;
        let spikeWidth = 40; // Độ rộng của cụm gai
        
        if (hasSpikes) {
            // Đặt vị trí bẫy gai ngẫu nhiên nằm gọn trên bề mặt gạch
            spikeX = xPos + 20 + Math.abs(Math.cos(i)) * (width - 70);
        }
        
        platforms.push({ x: xPos, y: yPos, width: width, height: 14, floorNum: i, hasSpikes, spikeX, spikeWidth });
    }
    platforms = platforms.filter(plat => plat.y < cameraY + 1200);
}

function updateGameUI() {
    document.getElementById("floorUI").innerText = player.currentFloor < 10 ? "0" + player.currentFloor : player.currentFloor;
    document.getElementById("highScoreUI").innerText = globalHighestFloor;

    let allPlayers = [{ name: 'Bạn', color: player.color, floor: player.currentFloor }];
    Object.keys(otherPlayers).forEach(id => {
        allPlayers.push({ name: `ID:${id.substring(0,4)}`, color: otherPlayers[id].color, floor: otherPlayers[id].currentFloor });
    });
    allPlayers.sort((a, b) => b.floor - a.floor);

    let listHTML = "";
    allPlayers.forEach((p, index) => {
        listHTML += `<div class="player-item">
            <span><span class="player-badge" style="background:${p.color}"></span>${p.name}</span>
            <span style="color:#00ffcc; font-weight:bold;">F${p.floor}</span>
        </div>`;
    });
    document.getElementById("playerCount").innerText = allPlayers.length;
    document.getElementById("playerListEntries").innerHTML = listHTML;
}

// --- CƠ CHẾ RESET KHI CHẠM GAI ---
function dieAndReset() {
    player.x = 400;
    player.y = 500;
    player.vx = 0;
    player.vy = 0;
    player.currentFloor = 1;
    player.isGrounded = false;
    cameraY = player.y - canvas.height / 2;
    updateGameUI();
}

// Đồng bộ socket kết nối mạng
socket.on('currentPlayers', (data) => {
    globalHighestFloor = data.globalHighestFloor;
    Object.keys(data.players).forEach((id) => {
        if (id !== socket.id) otherPlayers[id] = data.players[id];
        else player.color = data.players[id].color;
    });
    updateGameUI();
});
socket.on('newPlayer', (p) => { otherPlayers[p.id] = p; updateGameUI(); });
socket.on('playerMoved', (p) => { if (otherPlayers[p.id]) { otherPlayers[p.id].x = p.x; otherPlayers[p.id].y = p.y; otherPlayers[p.id].currentFloor = p.currentFloor; updateGameUI(); } });
socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; updateGameUI(); });
socket.on('newHighScore', (score) => { globalHighestFloor = score; document.getElementById("highScoreUI").innerText = globalHighestFloor; });

// Lắng nghe bàn phím Máy Tính
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

// --- LẮNG NGHE SỰ KIỆN CẢM ỨNG ĐIỆN THOẠI ---
function setupMobileButton(btnId, targetKey) {
    const btn = document.getElementById(btnId);
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); touchKeys[targetKey] = true; });
    btn.addEventListener("touchend", (e) => { e.preventDefault(); touchKeys[targetKey] = false; });
}
setupMobileButton("btnLeft", "left");
setupMobileButton("btnRight", "right");
setupMobileButton("btnJump", "jump");

function checkCollision(p, plat) {
    return p.x < plat.x + plat.width && p.x + p.width > plat.x &&
           p.y + p.height >= plat.y && p.y + p.height <= plat.y + plat.height && p.vy >= 0;
}

function gameLoop() {
    // Kết hợp cả nút bấm máy tính và cảm ứng điện thoại
    if (keys["ArrowRight"] || keys["KeyD"] || touchKeys.right) player.vx += 0.85;
    if (keys["ArrowLeft"] || keys["KeyA"] || touchKeys.left) player.vx -= 0.85;
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"] || touchKeys.jump) && player.isGrounded) {
        player.vy = -11.5;
        player.isGrounded = false;
    }

    player.vx *= friction;
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    generateFloorsUpTo(player.currentFloor);

    player.isGrounded = false;
    let oldFloor = player.currentFloor;

    for (let plat of platforms) {
        // 1. Kiểm tra va chạm đứng trên mặt gạch
        if (checkCollision(player, plat)) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.isGrounded = true;
            if(plat.floorNum > player.currentFloor) player.currentFloor = plat.floorNum;
        }

        // 2. KIỂM TRA VA CHẠM BẪY GAI (NẾU CHẠM = CHẾT)
        if (plat.hasSpikes && player.currentFloor >= plat.floorNum - 1) {
            let spikeTop = plat.y - 12; // Chiều cao gai là 12px
            if (player.x + player.width > plat.spikeX && 
                player.x < plat.spikeX + plat.spikeWidth &&
                player.y + player.height >= spikeTop && 
                player.y <= plat.y) {
                dieAndReset(); // Thực hiện lệnh chết, đưa về tầng 1
                break;
            }
        }
    }

    if (player.currentFloor !== oldFloor) updateGameUI();

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    let targetCameraY = player.y - canvas.height / 2 - 50;
    cameraY += (targetCameraY - cameraY) * 0.1;

    socket.emit('playerMovement', { x: player.x, y: player.y, currentFloor: player.currentFloor });

    // --- VẼ ĐỒ HỌA CANVASES ---
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(0, -cameraY);

    // Vẽ nền lưới
    ctx.strokeStyle = "rgba(0, 255, 204, 0.015)";
    ctx.lineWidth = 1;
    let startGridY = Math.floor(cameraY / 40) * 40;
    for (let gY = startGridY; gY < startGridY + canvas.height + 40; gY += 40) {
        ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(canvas.width, gY); ctx.stroke();
    }

    // Vẽ gạch và vẽ gai
    platforms.forEach(plat => {
        if (plat.y > cameraY - 100 && plat.y < cameraY + canvas.height + 100) {
            let isMilestone = plat.floorNum % 50 === 0;
            ctx.fillStyle = isMilestone ? "rgba(255, 0, 85, 0.85)" : "rgba(0, 255, 204, 0.65)";
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);

            // VẼ BẪY GAI MÀU ĐỎ NEON NẾU CÓ
            if (plat.hasSpikes) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ff3333";
                ctx.fillStyle = "#ff3355";
                
                // Vẽ cụm gai hình tam giác nhọn hoắt
                ctx.beginPath();
                let spikeCount = 4;
                let singleSpikeWidth = plat.spikeWidth / spikeCount;
                for (let s = 0; s < spikeCount; s++) {
                    let sX = plat.spikeX + (s * singleSpikeWidth);
                    ctx.moveTo(sX, plat.y);
                    ctx.lineTo(sX + singleSpikeWidth / 2, plat.y - 12); // Đỉnh gai
                    ctx.lineTo(sX + singleSpikeWidth, plat.y);
                }
                ctx.fill();
                ctx.shadowBlur = 0; // Reset bóng sáng
            }

            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.font = "bold 9px Orbitron";
            ctx.fillText("FLR-" + plat.floorNum, plat.x + 5, plat.y - 5);
        }
    });

    // Vẽ những người chơi trực tuyến khác
    Object.keys(otherPlayers).forEach((id) => {
        let p = otherPlayers[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 24, 38);
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.font = "9px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(`ID:${id.substring(0,4)}`, p.x + 12, p.y - 7);
        ctx.textAlign = "left";
    });

    // Vẽ chính bạn
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.strokeRect(player.x, player.y, player.width, player.height);

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
